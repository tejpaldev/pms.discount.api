# Docker Compose for Discount.API 
version: '3.8' 
 
services: 
  # API service 
  api: 
    build: 
      context: ../.. 
      dockerfile: deployment/docker/Dockerfile.Discount.API 
      args: 
        - GITHUB_USERNAME=${GITHUB_USERNAME:-} 
        - GITHUB_TOKEN=${GITHUB_TOKEN:-} 
    container_name: discount-api 
    restart: unless-stopped 
    environment: 
      - ASPNETCORE_ENVIRONMENT=Production 
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=true 
      - ConnectionStrings__DiscountDb=${PMS_DISCOUNT_CONNECTION_STRING:-} 
      - ConnectionStrings__Redis=${REDIS_CONNECTION_STRING:-} 
    volumes: 
      - api-logs:/app/logs 
    networks: 
      - pms_network 
    labels: 
      - "traefik.enable=true" 
      - "traefik.http.routers.discount-api.rule=Host(`api.yalkha.com`) && PathPrefix(`/discount`)" 
      - "traefik.http.routers.discount-api.entrypoints=websecure" 
      - "traefik.http.routers.discount-api.tls.certresolver=letsencrypt" 
      - "traefik.http.services.discount-api.loadbalancer.server.port=80" 
      - "traefik.http.middlewares.discount-api-strip.stripprefix.prefixes=/discount" 
      - "traefik.http.routers.discount-api.middlewares=discount-api-strip@docker" 
 
networks: 
  pms_network: 
    external: true 
 
volumes: 
  api-logs: 
    driver: local 
